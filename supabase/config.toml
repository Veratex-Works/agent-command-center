# API gateway JWT verification for Edge Functions defaults to true. This project
# validates the caller in `requireSuperadmin()` (Bearer + auth.getUser(jwt)).
[functions.deploy-bot]
verify_jwt = false

[functions.deploy-bot-callback]
verify_jwt = false

# n8n (server) POSTs { secret, botDeploymentId } to load stack YAML; keeps deploy webhook body small.
[functions.deploy-webhook-compose]
verify_jwt = false
